<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>משימת ביטויי אש - לג בעומר</title>
<style>
:root {
  --orange:#f97316; --dark:#9a3412; --cream:#fff7ed; --green:#22c55e; --red:#ef4444; --blue:#2563eb;
}
* { box-sizing: border-box; }
body {
  margin:0; min-height:100vh; font-family:Arial, sans-serif; text-align:center;
  background:radial-gradient(circle at top,#ffedd5,#fff7ed 45%,#fed7aa); color:#431407;
}
.game { max-width:860px; margin:auto; padding:18px; }
.card {
  background:rgba(255,255,255,.95); border-radius:28px; padding:22px;
  box-shadow:0 14px 35px rgba(124,45,18,.22); border:4px solid #fed7aa;
}
h1 { margin:8px 0 10px; color:var(--dark); font-size:34px; }
.subtitle { font-size:17px; margin-bottom:14px; }
.topbar { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:12px 0 18px; }
.badge { background:#ffedd5; border:2px solid #fdba74; border-radius:16px; padding:10px; font-weight:bold; }
.fireMeter { width:100%; height:24px; background:#ffedd5; border-radius:999px; overflow:hidden; border:2px solid #fdba74; margin-top:10px; }
.fireFill { height:100%; width:0%; background:linear-gradient(90deg,#f97316,#facc15,#ef4444); transition:width .35s ease; }
.illustrationBox {
  min-height:260px; display:grid; place-items:center; background:linear-gradient(180deg,#fff,#fff7ed);
  border-radius:24px; border:3px dashed #fb923c; margin:14px 0; padding:12px;
}
.illustrationBox img { max-width:100%; max-height:370px; object-fit:contain; border-radius:18px; }
.question { font-size:24px; font-weight:bold; margin:16px 0 14px; line-height:1.45; }
.answers { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px; }
button {
  border:none; border-radius:18px; cursor:pointer; font-size:19px; font-weight:bold;
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.answerBtn { min-height:72px; padding:12px; background:#fb923c; color:white; box-shadow:0 7px 0 #c2410c; }
.answerBtn:hover:not(:disabled) { transform:translateY(-2px); }
.answerBtn:disabled { cursor:default; opacity:.88; }
.correct { background:var(--green)!important; box-shadow:0 7px 0 #15803d!important; }
.wrong { background:var(--red)!important; box-shadow:0 7px 0 #b91c1c!important; }
.nextBtn,.startBtn { width:100%; margin-top:18px; padding:16px; background:var(--blue); color:white; box-shadow:0 7px 0 #1e40af; }
.nextBtn:disabled { opacity:.45; cursor:not-allowed; }
.feedback { min-height:48px; margin-top:14px; font-size:20px; font-weight:bold; }
.meaning { margin-top:8px; font-size:17px; font-weight:normal; background:#fff7ed; border-radius:14px; padding:10px; border:1px solid #fed7aa; }
.endScreen { display:none; }
.bigFire { font-size:100px; animation:flame .9s infinite alternate; }
@keyframes flame { from {transform:scale(1) rotate(-2deg)} to {transform:scale(1.06) rotate(2deg)} }
@media (max-width:620px) {
  .answers { grid-template-columns:1fr; } .topbar { grid-template-columns:1fr; }
  h1 { font-size:28px; } .question { font-size:21px; }
}
</style>
</head>
<body>
<div class="game">
  <div class="card" id="gameCard">
    <h1>🔥 משימת ביטויי אש 🔥</h1>
    <div class="subtitle">הסתכלו על האיור, קראו את הסיטואציה ובחרו את הביטוי המתאים.</div>
    <div class="topbar">
      <div class="badge" id="level">שאלה 1 מתוך 15</div>
      <div class="badge" id="score">ניקוד: 0</div>
      <div class="badge" id="streak">רצף: 0</div>
    </div>
    <div class="fireMeter"><div class="fireFill" id="fireFill"></div></div>
    <div class="illustrationBox"><img id="illustration" alt="איור רמז לביטוי" /></div>
    <div class="question" id="question"></div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="nextBtn" id="nextBtn" onclick="nextQuestion()" disabled>לשאלה הבאה ➜</button>
  </div>
  <div class="card endScreen" id="endScreen">
    <div class="bigFire">🔥</div>
    <h1>סיימתם את משימת האש!</h1>
    <div class="question" id="finalScore"></div>
    <div class="meaning" id="finalMessage"></div>
    <button class="startBtn" onclick="restartGame()">שחקו שוב</button>
  </div>
</div>

function shuffle(array) {
  const arr=[...array];
  for(let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function loadQuestion() {
  answered=false;
  const q=questions[current];
  document.getElementById("question").innerText=q.q;
  document.getElementById("illustration").src=q.img;
  document.getElementById("level").innerText=`שאלה ${current+1} מתוך ${questions.length}`;
  document.getElementById("score").innerText=`ניקוד: ${score}`;
  document.getElementById("streak").innerText=`רצף: ${streak}`;
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").disabled=true;
  const answersDiv=document.getElementById("answers");
  answersDiv.innerHTML="";
  shuffle([q.correct,...q.wrong]).forEach(ans=>{
    const btn=document.createElement("button");
    btn.innerText=ans;
    btn.className="answerBtn";
    btn.onclick=()=>checkAnswer(ans,btn);
    answersDiv.appendChild(btn);
  });
  updateFireMeter();
}

function checkAnswer(answer,btn) {
  if(answered) return;
  answered=true;
  const q=questions[current];
  const buttons=document.querySelectorAll(".answerBtn");
  buttons.forEach(b=>b.disabled=true);
  if(answer===q.correct) {
    btn.classList.add("correct");
    score+=10; streak++;
    document.getElementById("feedback").innerHTML=`כל הכבוד! זה הביטוי הנכון.<div class="meaning">${q.correct}: ${q.meaning}</div>`;
  } else {
    btn.classList.add("wrong");
    streak=0;
    buttons.forEach(b=>{ if(b.innerText===q.correct) b.classList.add("correct"); });
    document.getElementById("feedback").innerHTML=`לא בדיוק. הביטוי המתאים הוא: ${q.correct}<div class="meaning">${q.meaning}</div>`;
  }
  document.getElementById("score").innerText=`ניקוד: ${score}`;
  document.getElementById("streak").innerText=`רצף: ${streak}`;
  document.getElementById("nextBtn").disabled=false;
}

function nextQuestion() {
  current++;
  if(current>=questions.length) showEndScreen();
  else loadQuestion();
}

function updateFireMeter() {
  const progress=Math.round((current/questions.length)*100);
  document.getElementById("fireFill").style.width=`${progress}%`;
}

function showEndScreen() {
  document.getElementById("gameCard").style.display="none";
  document.getElementById("endScreen").style.display="block";
  document.getElementById("finalScore").innerText=`הניקוד שלכם: ${score} מתוך ${questions.length*10}`;
  let message="יפה! הכרתם ביטויים רבים הקשורים לאש.";
  if(score>=120) message="אלופים! המדורה שלכם דולקת בעוצמה.";
  else if(score>=80) message="עבודה טובה! כדאי לשחק שוב ולחזק עוד כמה ביטויים.";
  else message="התחלה טובה. שחקו שוב ונסו להיעזר באיורים וברמזים.";
  document.getElementById("finalMessage").innerText=message;
  document.getElementById("fireFill").style.width="100%";
}

function restartGame() {
  score=0; current=0; streak=0;
  document.getElementById("gameCard").style.display="block";
  document.getElementById("endScreen").style.display="none";
  loadQuestion();
}

loadQuestion();
</script>
